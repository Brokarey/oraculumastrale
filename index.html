<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oraculum Astrale | Portal Místico</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg-deep: #0a0015; --bg-glow: #1a0030; --gold: #d4a853; --gold-dim: rgba(212,168,83,0.2); --text-main: #e8e0f0; --text-dim: #a090b0; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); --transition: 0.4s cubic-bezier(0.4,0,0.2,1); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; line-height: 1.6; }
#stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(135deg, var(--bg-deep), var(--bg-glow)); }
.star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out; }
@keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
.screen { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; padding: 20px; opacity: 0; pointer-events: none; transition: var(--transition); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.screen-active { opacity: 1; pointer-events: all; position: relative; }
#screen-welcome { background: url('Tela-Inicial.png') center/cover no-repeat, var(--bg-deep); }
#screen-login, #screen-register { background: url('Tela-Outros.png') center/cover no-repeat, var(--bg-deep); }
#screen-dashboard { background: url('Tela.png') center/cover no-repeat, var(--bg-deep); background-attachment: fixed; }
.card { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--gold); letter-spacing: 1px; }
.btn { background: var(--gold); color: #000; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1.5px; width: 100%; margin-top: 15px; }
.btn:hover { background: #f1c40f; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212,168,83,0.3); }
.btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
input, select { width: 100%; padding: 14px; margin: 12px 0; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; font-family: 'Inter', sans-serif; }
header { width: 100%; padding: 20px 5%; display: none; justify-content: space-between; align-items: center; background: rgba(10,0,21,0.85); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--gold-dim); }
.main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 25px; width: 100%; max-width: 1200px; padding: 40px 0; }
.section-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
.section-card:hover { border-color: var(--gold); background: rgba(212,168,83,0.08); transform: translateY(-5px); }
.section-card i { font-size: 3rem; display: block; margin-bottom: 15px; }
.api-config-panel { display: none !important; }
.tarot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px,1fr)); gap: 10px; margin-top: 20px; max-height: 400px; overflow-y: auto; padding: 10px; }
.tarot-card-wrapper { perspective: 1000px; height: 100px; cursor: pointer; }
.tarot-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
.tarot-card-wrapper.flipped .tarot-card-inner { transform: rotateY(180deg); }
.tarot-card-front, .tarot-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 5px; border: 1px solid var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; text-align: center; padding: 5px; }
.tarot-card-back { background: linear-gradient(45deg,#1a0030,#2a1040); color: var(--gold); }
.tarot-card-front { background: #fff; color: #000; transform: rotateY(180deg); }
#toast { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000; padding: 15px 30px; border-radius: 10px; font-weight: 600; transform: translateY(150%); transition: 0.5s; z-index: 9999; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.modal-content { background: var(--bg-glow); border: 1px solid var(--gold); border-radius: 24px; padding: 35px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
.close-modal { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: var(--gold); }
</style>
</head>
<body>
<div id="stars-container"></div>
<div id="toast">Notificação</div>
<header id="main-header">
<div style="font-family:'Playfair Display';font-size:1.6rem;color:var(--gold);cursor:pointer;" onclick="location.reload()">🔮 Oraculum Astrale</div>
<div style="display:flex;gap:25px;align-items:center;">
<div style="font-size:0.9rem;color:var(--text-main);background:var(--glass);padding:5px 15px;border-radius:20px;border:1px solid var(--gold-dim);">✨ <span id="user-credits">0</span> Créditos</div>
<div style="font-size:0.9rem;color:var(--text-main);background:var(--glass);padding:5px 15px;border-radius:20px;border:1px solid var(--gold-dim);">🔥 <span id="user-streak">0</span> Dias</div>
<button style="margin:0;padding:8px 15px;font-size:0.7rem;background:var(--gold);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;" onclick="logout()">Sair</button>
</div>
</header>
<div id="screen-welcome" class="screen screen-active">
<div style="text-align:center;max-width:600px;">
<div style="font-size:6rem;margin-bottom:20px;">🔮</div>
<h1 style="font-size:4rem;margin-bottom:10px;">Oraculum Astrale</h1>
<p style="color:var(--text-dim);font-size:1.2rem;margin-bottom:40px;font-style:italic;">Desvende os mistérios do seu destino através das estrelas e dos arquétipos milenares.</p>
<div style="display:flex;gap:20px;justify-content:center;">
<button class="btn" style="max-width:200px;" onclick="navegar('screen-login')">Entrar</button>
<button class="btn btn-outline" style="max-width:200px;" onclick="navegar('screen-register')">Cadastrar</button>
</div>
</div>
</div>
<div id="screen-login" class="screen">
<div class="card">
<h2>Acessar Portal</h2>
<input type="email" id="login-email" placeholder="E-mail">
<input type="password" id="login-password" placeholder="Senha">
<button class="btn" onclick="auth.login()">Entrar no Oráculo</button>
<p style="text-align:center;margin-top:20px;font-size:0.9rem;color:var(--text-dim);">Novo por aqui? <span style="color:var(--gold);cursor:pointer;" onclick="navegar('screen-register')">Crie sua conta</span></p>
</div>
</div>
<div id="screen-register" class="screen">
<div class="card">
<h2>Nova Jornada</h2>
<input type="text" id="reg-name" placeholder="Nome Completo">
<input type="email" id="reg-email" placeholder="E-mail">
<input type="password" id="reg-password" placeholder="Senha">
<button class="btn" onclick="auth.register()" style="background:var(--gold);color:#000;">Cadastrar e Ganhar Créditos</button>
<button class="btn btn-outline" onclick="navegar('screen-login')">Voltar</button>
</div>
</div>
<div id="screen-dashboard" class="screen">
<div style="text-align:center;width:100%;padding-top:100px;">
<h2 id="dashboard-greeting" style="font-size:2.2rem;color:var(--gold);">Bem-vindo(a), Viajante</h2>
<p id="dashboard-phrase" style="color:var(--text-dim);font-style:italic;margin-bottom:30px;"></p>
<div class="main-grid" id="dashboard-grid"></div>
</div>
</div>

<script>
const auth = {
    login: function() {
        var e = document.getElementById('login-email').value.trim();
        var s = document.getElementById('login-password').value;
        if (!e || !s) { this.toast('Preencha todos os campos.'); return; }
        var u = JSON.parse(localStorage.getItem('oa_usuarios') || '[]');
        var x = u.find(function(v){ return v.email === e && v.senha === s; });
        if (!x) { this.toast('E-mail ou senha incorretos.'); return; }
        this.user = x;
        this.user.ultimoAcesso = new Date().toISOString().split('T')[0];
        localStorage.setItem('oa_usuarios', JSON.stringify(u));
        this.carregarDashboard();
        navegar('screen-dashboard');
        this.toast('Bem-vindo(a), ' + x.nome.split(' ')[0] + '!');
    },
    register: function() {
        var n = document.getElementById('reg-name').value.trim();
        var e = document.getElementById('reg-email').value.trim();
        var s = document.getElementById('reg-password').value;
        if (n.length < 3) { this.toast('Nome deve ter no mínimo 3 caracteres.'); return; }
        if (!e || e.indexOf('@') < 0) { this.toast('E-mail inválido.'); return; }
        if (s.length < 6) { this.toast('Senha deve ter no mínimo 6 caracteres.'); return; }
        var u = JSON.parse(localStorage.getItem('oa_usuarios') || '[]');
        if (u.find(function(v){ return v.email === e; })) { this.toast('E-mail já cadastrado.'); return; }
        u.push({nome:n, email:e, senha:s, creditos:5, streak:1, ultimoAcesso:new Date().toISOString().split('T')[0]});
        localStorage.setItem('oa_usuarios', JSON.stringify(u));
        this.toast('Conta criada! +5 créditos.');
        navegar('screen-login');
    },
    toast: function(m) {
        var t = document.getElementById('toast');
        t.textContent = m;
        t.style.transform = 'translateY(0)';
        setTimeout(function(){ t.style.transform = 'translateY(150%)'; }, 3000);
    },
    user: null,
    carregarDashboard: function() {
        document.getElementById('dashboard-greeting').textContent = 'Bem-vindo(a), ' + this.user.nome.split(' ')[0] + '!';
        var frases = ['O universo conspira a favor de quem conhece a si mesmo.', 'As estrelas inclinam, mas não obrigam.', 'O que você busca também está buscando você.'];
        document.getElementById('dashboard-phrase').textContent = frases[Math.floor(Math.random()*frases.length)];
        document.getElementById('user-credits').textContent = this.user.creditos;
        var sec = [
            {icon:'🃏',titulo:'Carta do Dia',desc:'Grátis diária',modal:'modal-cartadodia'},
            {icon:'☀️',titulo:'Horóscopo',desc:'Previsões',modal:'modal-horoscopo'},
            {icon:'🔮',titulo:'Tarô',desc:'Respostas + Leitura',modal:'modal-tarot'},
            {icon:'🔢',titulo:'Numerologia',desc:'Caminho de vida',modal:'modal-numerologia'},
            {icon:'☯️',titulo:'I Ching',desc:'Sabedoria',modal:'modal-iching'},
            {icon:'⚡',titulo:'Sim/Não',desc:'Rápido',modal:'modal-simnao'},
            {icon:'📖',titulo:'Sonhos',desc:'Interpretação',modal:'modal-sonhos'},
            {icon:'💘',titulo:'Compatibilidade',desc:'Amor',modal:'modal-compatibilidade'}
        ];
        document.getElementById('dashboard-grid').innerHTML = sec.map(function(s){
            return '<div class="section-card"><i>'+s.icon+'</i><h3>'+s.titulo+'</h3><p style="color:var(--text-dim);font-size:0.8rem;">'+s.desc+'</p></div>';
        }).join('');
    }
};

function navegar(tela) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('screen-active'); });
    document.getElementById(tela).classList.add('screen-active');
    document.getElementById('main-header').style.display = tela === 'screen-dashboard' ? 'flex' : 'none';
}

function logout() {
    auth.user = null;
    navegar('screen-welcome');
}

(function(){
    var c = document.getElementById('stars-container');
    for (var i = 0; i < 100; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = Math.random()*3+1;
        s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;animation-duration:'+(Math.random()*3+2)+'s;animation-delay:'+(Math.random()*5)+'s';
        c.appendChild(s);
    }
})();
</script>
</body>
</html>
